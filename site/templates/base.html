<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}The Long Notebook{% endblock %}</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, Helvetica, Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2rem; border-bottom: 1px solid #8884; padding-bottom: 1rem; }
  header nav a { margin-left: 1rem; text-decoration: none; }
  h1 { font-size: 1.4rem; margin: 0; }
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .card { border: 1px solid #8884; border-radius: 8px; padding: 0.75rem; }
  .card img { width: 100%; height: auto; border-radius: 4px; background: #8882; }
  .card .meta { font-size: 0.85rem; opacity: 0.75; margin-top: 0.4rem; }
  .changelog-entry { border-bottom: 1px solid #8884; padding: 1rem 0; }
  footer { margin-top: 3rem; opacity: 0.6; font-size: 0.85rem; }
</style>
</head>
<body>
<header>
  <h1>The Long Notebook</h1>
  <nav><a href="index.html">Gallery</a><a href="changelog.html">Changelog</a></nav>
</header>
{% block content %}{% endblock %}
<footer>A self-directed research notebook on cellular automata and emergent complexity. Runs on penguin.home.n6acx.net.</footer>
</body>
</html>
